---
# cPanel deployment configuration
# This deploys the repository's deploy/ folder to:
#   /home/ludog319/public_html/webofinfluence
# which corresponds to https://ludogogy.co.nz/webofinfluence
deployment:
  tasks:
    # Destination on cPanel (https://ludogogy.co.nz/webofinfluence)
    - echo "Deploying to /home/ludog319/public_html/webofinfluence"

    # Ensure target exists
    - set -xe
    - echo "PWD=$(pwd)"; echo "WHOAMI=$(whoami)"; echo "PATH=$PATH"
    - /bin/ls -la "/home/ludog319/public_html" || true
    - /bin/mkdir -p "/home/ludog319/public_html/webofinfluence"
    - /bin/ls -la "/home/ludog319/public_html/webofinfluence" || true
    # Remove any previously deployed .htaccess files that may cause 500 errors
    - /bin/rm -f "/home/ludog319/public_html/webofinfluence/.htaccess" || true
    - /bin/rm -f "/home/ludog319/public_html/webofinfluence/api/.htaccess" || true

    # 1) Build the frontend with the correct base path so assets resolve under /webofinfluence/
    - (cd deploy && if command -v npm >/dev/null 2>&1; then (npm ci || npm install) && npm run build; else echo "npm not found, skipping frontend build"; fi)

    # 2) Sync server (Flask API) and config files
    - /bin/rsync -a --delete --exclude '.htaccess' --exclude 'passenger_wsgi.py' --exclude 'requirements.txt' --exclude 'api/' --exclude 'php-api/gemini_api_key.txt' --filter 'protect php-api/gemini_api_key.txt' deploy/ "/home/ludog319/public_html/webofinfluence"/
    # 2a) Sync CSV data for server-side imports (available to Admin UI under /webofinfluence/data)
    - /bin/mkdir -p "/home/ludog319/public_html/webofinfluence/data"
    - /bin/rsync -a --delete csv_data/ "/home/ludog319/public_html/webofinfluence/data"/ || true
    # 2b) Deploy PHP API into /webofinfluence/api (PHP-only; no .htaccess needed)
    - /bin/mkdir -p "/home/ludog319/public_html/webofinfluence/api"
    - /bin/rsync -a --delete --exclude '.htaccess' --exclude 'config.php' deploy/php-api/ "/home/ludog319/public_html/webofinfluence/api"/
    # 2c) Ensure php-api directory exists for key placement (kept out of Git)
    - /bin/mkdir -p "/home/ludog319/public_html/webofinfluence/php-api"
    # 2d) Copy Gemini API key from repo working copy into php-api if present (file is .gitignored)
    - if [ -f deploy/php-api/gemini_api_key.txt ]; then /bin/cp deploy/php-api/gemini_api_key.txt "/home/ludog319/public_html/webofinfluence/php-api/gemini_api_key.txt"; elif [ -f deploy/api/gemini_api_key.txt ]; then /bin/cp deploy/api/gemini_api_key.txt "/home/ludog319/public_html/webofinfluence/php-api/gemini_api_key.txt"; elif [ -f gemini_api_key.txt ]; then /bin/cp gemini_api_key.txt "/home/ludog319/public_html/webofinfluence/php-api/gemini_api_key.txt"; else echo "No gemini_api_key.txt found in repo working copy"; fi
    - /bin/ls -la "/home/ludog319/public_html/webofinfluence/php-api" || true

    # 3) Sync built frontend to the same directory so Apache serves it (preserve src/ directory)
    - if [ -d deploy/dist ]; then /bin/rsync -a deploy/dist/ "/home/ludog319/public_html/webofinfluence"/; else echo "dist not found, skipping frontend sync"; fi
    # 3b) Write runtime app-config (prefer override if provided)
    - if [ -f deploy/app-config.override.js ]; then /bin/cp deploy/app-config.override.js "/home/ludog319/public_html/webofinfluence"/app-config.js; else /bin/cp deploy/app-config.js "/home/ludog319/public_html/webofinfluence"/app-config.js; fi
    # 3b-2) Copy auth-config.js (temporary token header for API testing)
    - if [ -f deploy/auth-config.js ]; then /bin/cp deploy/auth-config.js "/home/ludog319/public_html/webofinfluence"/auth-config.js; fi
    # 3c) Copy environment file if present (for DB credentials and other secrets)
    - if [ -f deploy/.env ]; then /bin/cp deploy/.env "/home/ludog319/public_html/webofinfluence"/.env; fi
    # 3d) Also sync deploy source for reference (not required to run)
    - /bin/rsync -a --delete --exclude 'node_modules' deploy/ "/home/ludog319/public_html/webofinfluence"/deploy-src/

    # 4) Ensure Passenger picks up Python deps and restart the app
    - echo "Skipping Passenger tmp/vendor setup (PHP-only API)"
    - true
    - echo "Skipping vendoring Python deps (no Passenger/Flask in use)"
    - echo "Skipping Passenger restart (no .htaccess or WSGI needed)"
