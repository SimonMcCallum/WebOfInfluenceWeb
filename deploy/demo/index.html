<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Demo — Web Of Influence (API Test)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    // Absolute API endpoint per request
    window.__APP_CONFIG__ = { API_BASE: 'https://ludogogy.co.nz/webofinfluence/api' };
    // Temporary demo token; rotate later
    window.__AUTH_TOKEN__ = window.__AUTH_TOKEN__ || 'changeme-strong-secret';
  </script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 1.25rem; line-height: 1.5; }
    h1 { margin: .25rem 0 .75rem; }
    button { padding: .5rem .75rem; }
    pre { background: #f8f8f8; padding: .75rem; border-radius: 6px; overflow: auto; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 900px) { .row { grid-template-columns: 1fr; } }
    .ok { color: #1e7e34; }
    .err { color: #b00020; white-space: pre-wrap; }
    input { width: 100%; padding: .5rem; margin: .25rem 0 .75rem; box-sizing: border-box; }
    label { display: block; font-weight: 600; }
    small { color: #666; }
  </style>
</head>
<body>
  <h1>Demo — Web Of Influence (API Test)</h1>
  <p class="ok">Minimal demo to test API access without building React. Uses a temporary Authorization header.</p>
  <p><strong>API Base:</strong> <code id="base"></code></p>
  <p><strong>Auth Token:</strong> <code id="tok"></code> <small>(temporary; replace before production)</small></p>

  <div class="row">
    <div>
      <h2>Health</h2>
      <button id="btnHealth">GET /</button>
      <pre id="outHealth"></pre>

      <h2>Example Data</h2>
      <button id="btnCandidates">GET /candidates</button>
      <pre id="outCandidates"></pre>
    </div>
    <div>
      <h2>Custom GET</h2>
      <label>Path (relative to API base, e.g., /party)</label>
      <input id="path" placeholder="/party" value="/party" />
      <button id="btnCustom">Fetch</button>
      <pre id="outCustom"></pre>
    </div>
  </div>

  <script>
    var API_BASE = (window.__APP_CONFIG__ && window.__APP_CONFIG__.API_BASE) || 'https://ludogogy.co.nz/webofinfluence/api';
    var TOKEN = window.__AUTH_TOKEN__ || 'changeme-strong-secret';
    document.getElementById('base').textContent = API_BASE;
    document.getElementById('tok').textContent = TOKEN;

    function authFetch(url, init) {
      init = init || {};
      init.headers = init.headers || {};
      var headers = new Headers(init.headers);
      if (!headers.has('Authorization')) headers.set('Authorization', 'Bearer ' + TOKEN);
      var out = {};
      headers.forEach(function(v, k){ out[k] = v; });
      init.headers = out;
      return fetch(url, init);
    }

    function setOut(el, ok, text) {
      el.className = ok ? 'ok' : 'err';
      el.textContent = text;
    }

    document.getElementById('btnHealth').onclick = function () {
      var el = document.getElementById('outHealth');
      setOut(el, true, 'Loading...');
      authFetch(API_BASE + '/', { cache: 'no-store' })
        .then(function (r) { return r.text(); })
        .then(function (t) { setOut(el, true, t); })
        .catch(function (e) { setOut(el, false, String(e)); });
    };

    document.getElementById('btnCandidates').onclick = function () {
      var el = document.getElementById('outCandidates');
      setOut(el, true, 'Loading...');
      authFetch(API_BASE + '/candidates', { cache: 'no-store' })
        .then(function (r) { return r.text(); })
        .then(function (t) { setOut(el, true, t); })
        .catch(function (e) { setOut(el, false, String(e)); });
    };

    document.getElementById('btnCustom').onclick = function () {
      var el = document.getElementById('outCustom');
      var p = document.getElementById('path').value || '/';
      setOut(el, true, 'Loading...');
      authFetch(API_BASE + p, { cache: 'no-store' })
        .then(function (r) { return r.text(); })
        .then(function (t) { setOut(el, true, t); })
        .catch(function (e) { setOut(el, false, String(e)); });
    };
  </script>
</body>
</html>
