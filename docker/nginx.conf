user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 32M;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             text/javascript image/svg+xml application/xml;

  server {
    listen 80 default_server;
    server_name _;
    root /var/www/html;
    index index.html;

    # Health endpoint for container HEALTHCHECK
    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    # PHP API — every request under /php-api/ is handled by index.php
    location ^~ /php-api/ {
      try_files $uri /php-api/index.php?$query_string;

      location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
      }
    }

    # CSV data directory (read-only for Admin imports)
    location /data/ {
      autoindex off;
    }

    # SPA fallback: serve files if present, otherwise hand to React's index.html
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
