name: Deploy WOI to ludogogy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid stacking redeploys
concurrency:
  group: woi-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Requires a GitHub self-hosted runner registered on ludogogy with the
    # labels below. Install: https://docs.github.com/actions/hosting-your-own-runners
    runs-on: [self-hosted, ludogogy]
    timeout-minutes: 15

    steps:
      - name: Sync source into /home/simon/git/WebOfInfluenceWeb
        run: |
          set -euo pipefail
          REPO=/home/simon/git/WebOfInfluenceWeb
          if [ ! -d "$REPO/.git" ]; then
            git clone https://github.com/SimonMcCallum/WebOfInfluenceWeb.git "$REPO"
          fi
          cd "$REPO"
          git fetch origin
          git reset --hard origin/main

      - name: Build & restart container
        working-directory: /home/simon/docker
        run: |
          set -euo pipefail
          docker compose build woi-app
          docker compose up -d woi-app
          docker compose ps woi-app

      - name: Smoke test
        run: |
          set -euo pipefail
          # Wait for /healthz to come back
          for i in $(seq 1 20); do
            if docker exec woi-app curl -fsS http://localhost/healthz >/dev/null 2>&1; then
              echo "woi-app healthy"
              exit 0
            fi
            sleep 2
          done
          echo "woi-app failed health check" >&2
          docker compose -f /home/simon/docker/docker-compose.yml logs --tail=80 woi-app >&2
          exit 1
